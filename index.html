			button3: "Applications for Cleverbridge",
            footerText: "Created by: Arda Köylü  s240987@th-ab.de & Ahmed Mohammedseid  s231120@th-ab.de"

        de: {
            title: "Willkommen beim PS5-Projekt",
            description: "Entdecken Sie Multimedia-Technologien und ihre Anwendungen.",
            mainPageP: "Wählen Sie eine Unterseite, um mehr zu erfahren.",
            buttonPaneText: "Wählen Sie eine Unterseite",
			 button1: "Technologie",
			button2: "Multimedia-Demonstration",
			button3: "Anwendungen für Cleverbridge",
            footerText: "Erstellt von: Arda Köylü  s240987@th-ab.de & Ahmed Mohammedseid  s231120@th-ab.de"
        },
        tr: {
            title: "PS5 Projesine Hoş Geldiniz",
            description: "Multimedya teknolojilerini ve uygulamalarını keşfedin.",
            mainPageP: "Daha fazla bilgi edinmek için bir alt sayfa seçin.",

            footerText: "Hazırlayanlar: Arda Köylü  s240987@th-ab.de & Ahmed Mohammedseid  s231120@th-ab.de"

        am: {
            title: "እንኳን ወደ PS5 ፕሮጀክት በደህና መጡ",
            description: "መልቲሚዲያ ቴክኖሎጂዎችን እና መተግበሪያቸውን ያስሱ።",
            mainPageP: "ተጨማሪ ለማወቅ አንድ ንዑስ ገጽ ይምረጡ።",

    let currentLanguage = 'en';

    function setLanguage(language) {
        currentLanguage = language;
        const textElements = {
            title: document.getElementById("title"),
            description: document.getElementById("description"),
            mainPageP: document.getElementById("mainPageP"),
            buttonPaneText: document.getElementById("buttonPaneText"),
			 button1: document.getElementById("button1"),
			button2: document.getElementById("button2"),
			button3: document.getElementById("button3"),
            footerText: document.getElementById("footer-text")
        };
        Object.keys(textElements).forEach(key => {
            if (textElements[key]) {
                textElements[key].innerText = translations[currentLanguage][key];
            }
        });
    }

    function navigateToPage(page) {
        const url = new URL(page, window.location.origin);
        url.searchParams.append("lang", currentLanguage);
        window.location.href = url;
    }

    // Set default language on page load
    setLanguage(currentLanguage);


</script>
</body>
